<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Web Music Player</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* サイドバー（プレイリスト管理） */
        .sidebar {
            width: 280px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            margin: 0 0 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .add-playlist-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .playlist-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
        }

        .playlist-list li {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 500;
        }

        .playlist-list li:hover { background-color: #f1f5f9; }
        .playlist-list li.active {
            background-color: #eff6ff;
            color: var(--primary-color);
            border-left: 4px solid var(--primary-color);
        }

        /* メインコンテンツ（曲リスト） */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
            padding-bottom: 120px; /* プレイヤーバーのスペース */
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h1 { margin: 0; font-size: 1.8rem; }

        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 20px;
            background-color: var(--panel-bg);
            transition: border-color 0.2s;
        }

        .upload-area:hover { border-color: var(--primary-color); }
        .upload-area input { display: none; }
        .upload-label { cursor: pointer; color: var(--primary-color); font-weight: bold; }

        .track-list {
            list-style: none;
            padding: 0;
            margin: 0;
            background: var(--panel-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .track-list li {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: grab;
        }
        .track-list li:last-child { border-bottom: none; }
        .track-list li:active { cursor: grabbing; background-color: #f8fafc; }
        
        .track-info { display: flex; align-items: center; gap: 15px; }
        .drag-handle { color: var(--text-muted); cursor: grab; }
        
        .track-list li.playing {
            background-color: #eff6ff;
            color: var(--primary-color);
            font-weight: bold;
        }

        .status-badge {
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 4px;
            background: #fee2e2;
            color: #ef4444;
        }
        .status-badge.ready {
            background: #dcfce7;
            color: #22c55e;
        }

        /* プレイヤーバー（画面下部固定） */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background-color: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            box-shadow: 0 -4px 15px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            padding: 0 30px;
            z-index: 100;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-right: 30px;
        }

        .controls button {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-main);
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .controls button:hover { color: var(--primary-color); }
        .play-btn {
            width: 50px;
            height: 50px;
            background-color: var(--primary-color) !important;
            color: white !important;
            border-radius: 50%;
        }
        .play-btn:hover { background-color: var(--primary-hover) !important; }

        .progress-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .time { font-size: 0.9rem; color: var(--text-muted); min-width: 45px; }

        /* カスタムレンジスライダー */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2>プレイリスト <button class="add-playlist-btn" onclick="createNewPlaylist()">+</button></h2>
    <ul class="playlist-list" id="playlist-list">
        </ul>
</aside>

<main class="main-content">
    <div class="header">
        <h1 id="current-playlist-title">プレイリストを選択してください</h1>
    </div>

    <div class="upload-area" id="drop-zone">
        ここに音楽ファイルをドラッグ＆ドロップするか、
        <label class="upload-label">
            クリックしてファイルを選択
            <input type="file" id="file-input" multiple accept="audio/*">
        </label>
        <br><small>※リロード時は、再度ファイルを選択してリンクを復元してください</small>
    </div>

    <ul class="track-list" id="track-list">
        </ul>
</main>

<footer class="player-bar">
    <audio id="audio-element"></audio>
    <div class="controls">
        <button id="prev-btn">⏮</button>
        <button id="play-btn" class="play-btn">▶</button>
        <button id="next-btn">⏭</button>
        <button id="repeat-btn" style="font-size: 1.2rem; color: var(--text-muted);">🔁</button>
    </div>
    <div class="progress-container">
        <span class="time" id="current-time">0:00</span>
        <input type="range" id="seek-bar" value="0" step="0.1">
        <span class="time" id="duration">0:00</span>
    </div>
</footer>

<script>
    // --- 状態管理 ---
    // playlists: [{ id: 1, name: "お気に入り", tracks: ["song1.mp3", "song2.mp3"] }]
    let playlists = JSON.parse(localStorage.getItem('webMusicPlaylists')) || [{ id: Date.now(), name: "デフォルト", tracks: [] }];
    let currentPlaylistId = playlists[0].id;
    
    // fileMap: メモリ上で実際のFileオブジェクトを保持する辞書 { "song1.mp3": Fileオブジェクト }
    let fileMap = {}; 
    let currentTrackIndex = -1;
    let repeatMode = 0; // 0:OFF, 1:全曲, 2:1曲

    // --- DOM要素 ---
    const playlistListEl = document.getElementById('playlist-list');
    const trackListEl = document.getElementById('track-list');
    const playlistTitleEl = document.getElementById('current-playlist-title');
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    
    const audio = document.getElementById('audio-element');
    const playBtn = document.getElementById('play-btn');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const repeatBtn = document.getElementById('repeat-btn');
    const seekBar = document.getElementById('seek-bar');
    const currentTimeEl = document.getElementById('current-time');
    const durationEl = document.getElementById('duration');

    // --- 初期化 ---
    function init() {
        renderPlaylists();
        renderTracks();
    }

    // --- プレイリスト管理 ---
    function saveToLocalStorage() {
        localStorage.setItem('webMusicPlaylists', JSON.stringify(playlists));
    }

    function createNewPlaylist() {
        const name = prompt("新しいプレイリスト名を入力してください:");
        if (name && name.trim() !== "") {
            const newPlaylist = { id: Date.now(), name: name.trim(), tracks: [] };
            playlists.push(newPlaylist);
            currentPlaylistId = newPlaylist.id;
            saveToLocalStorage();
            renderPlaylists();
            renderTracks();
        }
    }

    function renderPlaylists() {
        playlistListEl.innerHTML = '';
        playlists.forEach(pl => {
            const li = document.createElement('li');
            li.textContent = pl.name;
            if (pl.id === currentPlaylistId) li.classList.add('active');
            li.onclick = () => {
                currentPlaylistId = pl.id;
                currentTrackIndex = -1;
                renderPlaylists();
                renderTracks();
            };
            playlistListEl.appendChild(li);
        });
    }

    function getCurrentPlaylist() {
        return playlists.find(pl => pl.id === currentPlaylistId);
    }

    // --- 曲リストとドラッグ＆ドロップ並び替え ---
    let draggedItemIndex = null;

    function renderTracks() {
        trackListEl.innerHTML = '';
        const pl = getCurrentPlaylist();
        playlistTitleEl.textContent = pl.name;

        pl.tracks.forEach((trackName, index) => {
            const li = document.createElement('li');
            li.draggable = true;
            
            // 再生準備完了かどうかのバッジ
            const isReady = !!fileMap[trackName];
            const badgeHTML = isReady 
                ? `<span class="status-badge ready">準備完了</span>` 
                : `<span class="status-badge">未リンク</span>`;

            li.innerHTML = `
                <div class="track-info">
                    <span class="drag-handle">≡</span>
                    <span>${trackName}</span>
                </div>
                <div>${badgeHTML}</div>
            `;

            if (index === currentTrackIndex) li.classList.add('playing');

            // クリックで再生
            li.addEventListener('click', (e) => {
                if(e.target.className !== 'drag-handle') playTrack(index);
            });

            // ドラッグ＆ドロップイベント（並び替え）
            li.addEventListener('dragstart', () => draggedItemIndex = index);
            li.addEventListener('dragover', (e) => e.preventDefault());
            li.addEventListener('drop', (e) => {
                e.preventDefault();
                if (draggedItemIndex === null || draggedItemIndex === index) return;
                
                // 配列の要素を入れ替え
                const trackToMove = pl.tracks.splice(draggedItemIndex, 1)[0];
                pl.tracks.splice(index, 0, trackToMove);
                
                // 再生中のインデックスを追従
                if (currentTrackIndex === draggedItemIndex) {
                    currentTrackIndex = index;
                } else if (currentTrackIndex > draggedItemIndex && currentTrackIndex <= index) {
                    currentTrackIndex--;
                } else if (currentTrackIndex < draggedItemIndex && currentTrackIndex >= index) {
                    currentTrackIndex++;
                }

                saveToLocalStorage();
                renderTracks();
            });

            trackListEl.appendChild(li);
        });
    }

    // --- ファイル追加処理 ---
    function handleFiles(files) {
        const pl = getCurrentPlaylist();
        Array.from(files).forEach(file => {
            fileMap[file.name] = file; // 実体ファイルをメモリに保存
            if (!pl.tracks.includes(file.name)) {
                pl.tracks.push(file.name); // プレイリストには名前だけ保存
            }
        });
        saveToLocalStorage();
        renderTracks();
    }

    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
    
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = "var(--primary-color)";
    });
    dropZone.addEventListener('dragleave', () => dropZone.style.borderColor = "var(--border-color)");
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = "var(--border-color)";
        if (e.dataTransfer.files) handleFiles(e.dataTransfer.files);
    });

    // --- プレイヤー制御 ---
    function playTrack(index) {
        const pl = getCurrentPlaylist();
        if (index < 0 || index >= pl.tracks.length) return;
        
        const trackName = pl.tracks[index];
        const file = fileMap[trackName];

        if (!file) {
            alert(`「${trackName}」の実体ファイルがありません。\nファイルを再度画面にドラッグ＆ドロップしてリンクしてください。`);
            return;
        }

        currentTrackIndex = index;
        audio.src = URL.createObjectURL(file);
        audio.play();
        playBtn.textContent = '⏸';
        renderTracks();
    }

    function togglePlay() {
        if (!audio.src) {
            if (getCurrentPlaylist().tracks.length > 0) playTrack(0);
            return;
        }
        if (audio.paused) {
            audio.play();
            playBtn.textContent = '⏸';
        } else {
            audio.pause();
            playBtn.textContent = '▶';
        }
    }

    playBtn.addEventListener('click', togglePlay);
    
    prevBtn.addEventListener('click', () => {
        if (audio.currentTime > 3) {
            audio.currentTime = 0; // 3秒以上再生してたら曲の頭出し
        } else if (currentTrackIndex > 0) {
            playTrack(currentTrackIndex - 1);
        }
    });

    nextBtn.addEventListener('click', () => {
        const pl = getCurrentPlaylist();
        if (currentTrackIndex + 1 < pl.tracks.length) {
            playTrack(currentTrackIndex + 1);
        } else if (repeatMode === 1) {
            playTrack(0);
        }
    });

    const repeatIcons = ['🔁', '🔁(全)', '🔂(1)'];
    repeatBtn.addEventListener('click', () => {
        repeatMode = (repeatMode + 1) % 3;
        repeatBtn.textContent = repeatIcons[repeatMode];
        repeatBtn.style.color = repeatMode === 0 ? "var(--text-muted)" : "var(--primary-color)";
        audio.loop = (repeatMode === 2);
    });

    audio.addEventListener('ended', () => {
        if (repeatMode === 2) return;
        const pl = getCurrentPlaylist();
        if (currentTrackIndex + 1 < pl.tracks.length) {
            playTrack(currentTrackIndex + 1);
        } else if (repeatMode === 1) {
            playTrack(0);
        } else {
            playBtn.textContent = '▶';
        }
    });

    // --- カスタムシークバーと時間表示 ---
    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    audio.addEventListener('loadedmetadata', () => {
        seekBar.max = audio.duration;
        durationEl.textContent = formatTime(audio.duration);
    });

    audio.addEventListener('timeupdate', () => {
        if (!audio.paused) seekBar.value = audio.currentTime;
        currentTimeEl.textContent = formatTime(audio.currentTime);
    });

    seekBar.addEventListener('input', () => {
        audio.currentTime = seekBar.value;
    });

    // 起動時の初期化実行
    init();
</script>
</body>
</html>
