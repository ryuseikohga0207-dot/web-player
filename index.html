<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Media Player</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }
        .player-container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 0;
        }
        .file-upload {
            margin-bottom: 20px;
            text-align: center;
        }
        audio {
            width: 100%;
            margin-bottom: 15px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .playlist-container {
            border-top: 2px solid #eee;
            padding-top: 15px;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 250px;
            overflow-y: auto;
        }
        li {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        li:hover {
            background-color: #f9f9f9;
        }
        li.active {
            font-weight: bold;
            color: #007bff;
            background-color: #eef5ff;
        }
    </style>
</head>
<body>

<div class="player-container">
    <h1>Web Media Player</h1>
    
    <div class="file-upload">
        <input type="file" id="file-input" multiple accept="audio/*,video/*">
    </div>

    <audio id="audio-player" controls></audio>

    <div class="controls">
        <button id="prev-btn">⏮ 前へ</button>
        <button id="play-btn">▶ 再生</button>
        <button id="pause-btn">⏸ 一時停止</button>
        <button id="next-btn">⏭ 次へ</button>
        <button id="repeat-btn">🔁 リピート: OFF</button>
        <button id="download-btn" disabled>💾 ファイル保存</button>
    </div>

    <div class="playlist-container">
        <h3>プレイリスト</h3>
        <ul id="playlist"></ul>
    </div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const playlistEl = document.getElementById('playlist');
    const audioPlayer = document.getElementById('audio-player');
    const playBtn = document.getElementById('play-btn');
    const pauseBtn = document.getElementById('pause-btn');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const repeatBtn = document.getElementById('repeat-btn');
    const downloadBtn = document.getElementById('download-btn');

    let playlist = [];
    let currentIndex = 0;
    
    // リピートモード: 0 = OFF, 1 = 全曲ループ, 2 = 1曲ループ
    let repeatMode = 0; 
    const repeatLabels = ["🔁 リピート: OFF", "🔁 リピート: 全曲", "🔂 リピート: 1曲"];

    // ファイルアップロード処理
    fileInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        
        files.forEach(file => {
            playlist.push(file);
            const li = document.createElement('li');
            li.textContent = file.name;
            li.addEventListener('click', () => playTrack(playlist.indexOf(file)));
            playlistEl.appendChild(li);
        });

        // 最初のファイルが追加されたら自動セット
        if (playlist.length > 0 && !audioPlayer.src) {
            playTrack(0, false);
        }
    });

    // トラック再生処理
    function playTrack(index, autoPlay = true) {
        if (index < 0 || index >= playlist.length) return;
        
        currentIndex = index;
        const file = playlist[currentIndex];
        
        // ブラウザ上でファイルにアクセスするための一時URLを作成
        const objectUrl = URL.createObjectURL(file);
        audioPlayer.src = objectUrl;
        
        if (autoPlay) {
            audioPlayer.play();
        }

        updatePlaylistUI();

        // 保存（ダウンロード）機能の設定
        downloadBtn.disabled = false;
        downloadBtn.onclick = () => {
            const a = document.createElement('a');
            a.href = objectUrl;
            a.download = file.name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };
    }

    // プレイリストの見た目を更新
    function updatePlaylistUI() {
        const items = playlistEl.getElementsByTagName('li');
        Array.from(items).forEach((li, idx) => {
            if (idx === currentIndex) {
                li.classList.add('active');
            } else {
                li.classList.remove('active');
            }
        });
    }

    // コントロールボタンのイベント
    playBtn.addEventListener('click', () => audioPlayer.play());
    pauseBtn.addEventListener('click', () => audioPlayer.pause());
    
    prevBtn.addEventListener('click', () => {
        if (currentIndex > 0) playTrack(currentIndex - 1);
    });
    
    nextBtn.addEventListener('click', () => {
        if (currentIndex + 1 < playlist.length) {
            playTrack(currentIndex + 1);
        } else if (repeatMode === 1) {
            playTrack(0); // 全曲リピート時は最初に戻る
        }
    });

    // リピート切り替え
    repeatBtn.addEventListener('click', () => {
        repeatMode = (repeatMode + 1) % 3;
        repeatBtn.textContent = repeatLabels[repeatMode];
        // 1曲ループの場合はaudioタグのloop属性を有効にする
        audioPlayer.loop = (repeatMode === 2);
    });

    // 曲が終了した時の自動処理
    audioPlayer.addEventListener('ended', () => {
        if (repeatMode === 2) {
            return; // audio.loopが処理するため何もしない
        }
        
        if (currentIndex + 1 < playlist.length) {
            playTrack(currentIndex + 1);
        } else if (repeatMode === 1) {
            playTrack(0);
        }
    });
</script>

</body>
</html>
