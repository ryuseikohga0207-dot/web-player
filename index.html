<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Music Player (Persistent)</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <meta name="theme-color" content="#ffffff">
    
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --nav-height: 65px;
            --player-height: 90px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-bottom: calc(var(--nav-height) + var(--player-height) + 20px);
        }

        /* ビューの切り替え */
        .view { display: none; padding: 20px; max-width: 800px; margin: 0 auto; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1, h2 { margin-top: 0; font-size: 1.5rem; }

        /* アップロードエリア */
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 20px;
            background-color: var(--panel-bg);
            transition: border-color 0.2s;
        }
        .upload-area input { display: none; }
        .upload-label { cursor: pointer; color: var(--primary-color); font-weight: bold; }

        /* リスト全般 */
        .list-container {
            list-style: none; padding: 0; margin: 0;
            background: var(--panel-bg);
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .list-container li {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .list-container li:last-child { border-bottom: none; }
        
        /* トラックリスト */
        .track-list li { cursor: grab; }
        .track-list li.playing { background-color: #eff6ff; color: var(--primary-color); font-weight: bold; border-left: 4px solid var(--primary-color); }
        .track-info { display: flex; align-items: center; gap: 15px; width: 70%; }
        .track-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .drag-handle { color: var(--border-color); cursor: grab; display: flex; }
        
        /* プレイリスト管理 */
        .playlist-manage li { cursor: pointer; }
        .playlist-manage li.active-pl { background-color: #eff6ff; font-weight: bold; }
        .delete-btn {
            background: none; border: none; color: #ef4444; padding: 8px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .delete-btn:hover { background-color: #fee2e2; }

        /* ボタンスタイル */
        .primary-btn {
            background-color: var(--primary-color); color: white; border: none;
            padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;
            display: inline-flex; align-items: center; gap: 8px; width: 100%; justify-content: center; margin-bottom: 20px;
        }

        /* プレイヤーバー（下部固定） */
        .player-bar {
            position: fixed; bottom: var(--nav-height); left: 0; width: 100%; height: var(--player-height);
            background-color: var(--panel-bg); border-top: 1px solid var(--border-color);
            box-shadow: 0 -4px 15px rgba(0,0,0,0.03); display: flex; flex-direction: column; justify-content: center;
            padding: 10px 20px; z-index: 100;
        }
        .controls { display: flex; justify-content: center; align-items: center; gap: 25px; margin-bottom: 5px; }
        .icon-btn { background: none; border: none; cursor: pointer; color: var(--text-main); display: flex; align-items: center; justify-content: center; padding: 5px; }
        .icon-btn svg { width: 24px; height: 24px; fill: currentColor; }
        .icon-btn:hover { color: var(--primary-color); }
        .icon-btn.active { color: var(--primary-color); }
        
        .play-btn { background-color: var(--primary-color) !important; color: white !important; border-radius: 50%; width: 45px; height: 45px; }
        .play-btn:hover { background-color: var(--primary-hover) !important; }

        .progress-container { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; color: var(--text-muted); }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: #e2e8f0; border-radius: 2px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--primary-color); cursor: pointer; }

        /* ボトムナビゲーション */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: var(--nav-height);
            background-color: var(--panel-bg); border-top: 1px solid var(--border-color);
            display: flex; z-index: 110; padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.75rem; gap: 4px;
        }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; }
        .nav-item.active { color: var(--primary-color); font-weight: bold; }
    </style>
</head>
<body>

<div id="view-player" class="view active">
    <h1 id="current-playlist-title">読み込み中...</h1>
    
    <div class="upload-area" id="drop-zone">
        曲を追加するにはここへドロップ、または
        <label class="upload-label">
            ファイルを選択
            <input type="file" id="file-input" multiple accept="audio/*,video/mp4">
        </label>
    </div>

    <ul class="list-container track-list" id="track-list"></ul>
</div>

<div id="view-playlists" class="view">
    <h2>プレイリスト管理</h2>
    <button class="primary-btn" onclick="createNewPlaylist()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        新しいプレイリストを作成
    </button>
    <ul class="list-container playlist-manage" id="playlist-list"></ul>
</div>

<div class="player-bar">
    <audio id="audio-element"></audio>
    <div class="controls">
        <button id="repeat-btn" class="icon-btn">
            <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        </button>
        <button id="prev-btn" class="icon-btn">
            <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button id="play-btn" class="icon-btn play-btn">
            <svg viewBox="0 0 24 24" id="play-icon"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button id="next-btn" class="icon-btn">
            <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
    </div>
    <div class="progress-container">
        <span id="current-time">0:00</span>
        <input type="range" id="seek-bar" value="0" step="0.1">
        <span id="duration">0:00</span>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-item active" onclick="switchView('player')">
        <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        再生
    </button>
    <button class="nav-item" onclick="switchView('playlists')">
        <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12zM10 9h8v2h-8zm0 3h4v2h-4zm0-6h8v2h-8z"/></svg>
        プレイリスト
    </button>
</nav>

<script>
    // --- PWA Service Worker の登録 ---
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW registration failed:', err));
    }

    // --- 定数と状態管理 ---
    const DB_NAME = "MusicDB";
    let db;
    let playlists = JSON.parse(localStorage.getItem('webMusicPlaylists')) || [{ id: Date.now(), name: "マイプレイリスト", tracks: [] }];
    let currentPlaylistId = playlists[0].id;
    let currentTrackIndex = -1;
    let repeatMode = 0; // 0:OFF, 1:全曲, 2:1曲

    const SVGS = {
        play: '<path d="M8 5v14l11-7z"/>',
        pause: '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    };

    // --- DOM要素 ---
    const trackListEl = document.getElementById('track-list');
    const playlistListEl = document.getElementById('playlist-list');
    const playlistTitleEl = document.getElementById('current-playlist-title');
    const audio = document.getElementById('audio-element');
    const playIcon = document.getElementById('play-icon');
    
    // --- 拡張子を非表示にする関数 ---
    function formatTrackName(filename) {
        return filename.replace(/\.[^/.]+$/, "");
    }

    // --- IndexedDBの初期化 ---
    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = e => {
                e.target.result.createObjectStore("songs", { keyPath: "name" });
            };
            request.onsuccess = e => {
                db = e.target.result;
                resolve();
            };
            request.onerror = e => reject(e.target.error);
        });
    }

    // --- アプリの初期化 ---
    initDB().then(() => {
        renderPlaylists();
        renderTracks();
    }).catch(err => alert("データベースの初期化に失敗しました: " + err));

    // --- ビュー切り替え ---
    function switchView(viewName) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        document.getElementById(`view-${viewName}`).classList.add('active');
        const btns = document.querySelectorAll('.nav-item');
        if(viewName === 'player') btns[0].classList.add('active');
        if(viewName === 'playlists') btns[1].classList.add('active');
    }

    // --- プレイリスト管理 ---
    function saveToLocalStorage() { 
        localStorage.setItem('webMusicPlaylists', JSON.stringify(playlists)); 
    }

    function createNewPlaylist() {
        const name = prompt("新しいプレイリスト名を入力してください:");
        if (name && name.trim() !== "") {
            const newPlaylist = { id: Date.now(), name: name.trim(), tracks: [] };
            playlists.push(newPlaylist);
            saveToLocalStorage();
            renderPlaylists();
        }
    }

    function deletePlaylist(id, event) {
        event.stopPropagation();
        if (playlists.length <= 1) {
            alert("最後のプレイリストは削除できません。");
            return;
        }
        if (confirm("このプレイリストを削除しますか？（曲ファイル自体は消えません）")) {
            playlists = playlists.filter(p => p.id !== id);
            if (currentPlaylistId === id) currentPlaylistId = playlists[0].id;
            saveToLocalStorage();
            renderPlaylists();
            renderTracks();
        }
    }

    function renderPlaylists() {
        playlistListEl.innerHTML = '';
        playlists.forEach(pl => {
            const li = document.createElement('li');
            if (pl.id === currentPlaylistId) li.classList.add('active-pl');
            
            li.innerHTML = `
                <span>${pl.name} <small style="color:var(--text-muted)">(${pl.tracks.length}曲)</small></span>
                <button class="delete-btn" onclick="deletePlaylist(${pl.id}, event)">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                </button>
            `;
            li.onclick = () => {
                currentPlaylistId = pl.id;
                currentTrackIndex = -1;
                renderPlaylists();
                renderTracks();
                switchView('player'); 
            };
            playlistListEl.appendChild(li);
        });
    }

    function getCurrentPlaylist() { 
        return playlists.find(pl => pl.id === currentPlaylistId) || playlists[0]; 
    }

    // --- 曲リスト表示と並び替え ---
    let draggedItemIndex = null;

    function renderTracks() {
        trackListEl.innerHTML = '';
        const pl = getCurrentPlaylist();
        playlistTitleEl.textContent = pl.name;

        // DBに保存されている曲名一覧を取得して存在チェックを行う
        const tx = db.transaction("songs", "readonly");
        const request = tx.objectStore("songs").getAllKeys();

        request.onsuccess = e => {
            const savedFiles = e.target.result || [];

            pl.tracks.forEach((trackName, index) => {
                const li = document.createElement('li');
                li.draggable = true;
                
                // DBにファイルが存在するかチェック
                const isReady = savedFiles.includes(trackName);
                const statusColor = isReady ? '#22c55e' : '#ef4444';
                const statusText = isReady ? '♪' : '!';

                const displayName = formatTrackName(trackName);

                li.innerHTML = `
                    <div class="track-info">
                        <span class="drag-handle"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M3 15h18v-2H3v2zm0 4h18v-2H3v2zm0-8h18V9H3v2zm0-6v2h18V5H3z"/></svg></span>
                        <span class="track-name">${displayName}</span>
                    </div>
                    <span style="color:${statusColor}; font-weight:bold;" title="${isReady ? '再生可能' : 'ファイルが見つかりません'}">${statusText}</span>
                `;

                if (index === currentTrackIndex) li.classList.add('playing');

                li.addEventListener('click', (e) => { 
                    if(!e.target.closest('.drag-handle')) playTrack(index); 
                });

                // ドラッグ＆ドロップ（並び替え）
                li.addEventListener('dragstart', () => draggedItemIndex = index);
                li.addEventListener('dragover', (e) => e.preventDefault());
                li.addEventListener('drop', (e) => {
                    e.preventDefault();
                    if (draggedItemIndex === null || draggedItemIndex === index) return;
                    const trackToMove = pl.tracks.splice(draggedItemIndex, 1)[0];
                    pl.tracks.splice(index, 0, trackToMove);
                    
                    if (currentTrackIndex === draggedItemIndex) currentTrackIndex = index;
                    else if (currentTrackIndex > draggedItemIndex && currentTrackIndex <= index) currentTrackIndex--;
                    else if (currentTrackIndex < draggedItemIndex && currentTrackIndex >= index) currentTrackIndex++;
                    
                    saveToLocalStorage();
                    renderTracks();
                });

                trackListEl.appendChild(li);
            });
        };
    }

    // --- ファイル追加処理 (IndexedDBに保存) ---
    function handleFiles(files) {
        if (!files.length) return;
        const pl = getCurrentPlaylist();
        
        const tx = db.transaction("songs", "readwrite");
        const store = tx.objectStore("songs");

        Array.from(files).forEach(file => {
            // DBに保存
            store.put({ name: file.name, data: file });
            // プレイリストに名前を追加（重複防止）
            if (!pl.tracks.includes(file.name)) pl.tracks.push(file.name);
        });

        tx.oncomplete = () => {
            saveToLocalStorage();
            renderTracks();
            renderPlaylists();
        };
        tx.onerror = e => console.error("ファイルの保存に失敗しました", e);
    }

    // アップロードUIのイベント
    document.getElementById('file-input').addEventListener('change', (e) => handleFiles(e.target.files));
    const dropZone = document.getElementById('drop-zone');
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = "var(--primary-color)"; });
    dropZone.addEventListener('dragleave', () => dropZone.style.borderColor = "var(--border-color)");
    dropZone.addEventListener('drop', (e) => { 
        e.preventDefault(); 
        dropZone.style.borderColor = "var(--border-color)"; 
        if (e.dataTransfer.files) handleFiles(e.dataTransfer.files); 
    });

    // --- プレイヤー制御 ---
    function playTrack(index) {
        const pl = getCurrentPlaylist();
        if (index < 0 || index >= pl.tracks.length) return;
        const trackName = pl.tracks[index];

        // IndexedDBから音声データを取得
        const tx = db.transaction("songs", "readonly");
        const request = tx.objectStore("songs").get(trackName);

        request.onsuccess = e => {
            const record = e.target.result;
            if (!record) { 
                alert('ファイルがデータベースに見つかりません。ファイルを再度ドロップして追加してください。'); 
                return; 
            }

            currentTrackIndex = index;
            
            // メモリリーク防止のため、前のURLを解放
            if (audio.src) {
                URL.revokeObjectURL(audio.src);
            }

            audio.src = URL.createObjectURL(record.data);
            audio.play();
            playIcon.innerHTML = SVGS.pause;
            renderTracks(); // playingクラスを付け直すために再描画
        };
    }

    // ボタン類のイベントリスナー
    document.getElementById('play-btn').addEventListener('click', () => {
        if (!audio.src) { 
            if (getCurrentPlaylist().tracks.length > 0) playTrack(0); 
            return; 
        }
        if (audio.paused) { audio.play(); playIcon.innerHTML = SVGS.pause; }
        else { audio.pause(); playIcon.innerHTML = SVGS.play; }
    });
    
    document.getElementById('prev-btn').addEventListener('click', () => {
        if (audio.currentTime > 3) audio.currentTime = 0;
        else if (currentTrackIndex > 0) playTrack(currentTrackIndex - 1);
    });

    document.getElementById('next-btn').addEventListener('click', () => {
        const pl = getCurrentPlaylist();
        if (currentTrackIndex + 1 < pl.tracks.length) playTrack(currentTrackIndex + 1);
        else if (repeatMode === 1) playTrack(0); // 全曲リピート
    });

    const repeatBtn = document.getElementById('repeat-btn');
    repeatBtn.addEventListener('click', () => {
        repeatMode = (repeatMode + 1) % 3;
        repeatBtn.classList.toggle('active', repeatMode > 0);
        audio.loop = (repeatMode === 2); // 1曲リピート
    });

    audio.addEventListener('ended', () => {
        if (repeatMode === 2) return; // 1曲リピートはaudio.loopに任せる
        const pl = getCurrentPlaylist();
        if (currentTrackIndex + 1 < pl.tracks.length) playTrack(currentTrackIndex + 1);
        else if (repeatMode === 1) playTrack(0);
        else playIcon.innerHTML = SVGS.play; // リピートなしで最後なら停止
    });

    // --- シークバー ---
    const seekBar = document.getElementById('seek-bar');
    const currentTimeEl = document.getElementById('current-time');
    const durationEl = document.getElementById('duration');

    function formatTime(s) {
        if (isNaN(s)) return "0:00";
        return `${Math.floor(s / 60)}:${Math.floor(s % 60).toString().padStart(2, '0')}`;
    }

    audio.addEventListener('loadedmetadata', () => { 
        seekBar.max = audio.duration; 
        durationEl.textContent = formatTime(audio.duration); 
    });
    
    audio.addEventListener('timeupdate', () => {
        if (!audio.paused) seekBar.value = audio.currentTime;
        currentTimeEl.textContent = formatTime(audio.currentTime);
    });
    
    seekBar.addEventListener('input', () => audio.currentTime = seekBar.value);

</script>
</body>
</html>
